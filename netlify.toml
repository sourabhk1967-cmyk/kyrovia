[build]
  base = "/"
  command = "npm run build:netlify"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# API fallback. Set VITE_API_URL to the persistent Express backend for full
# Playwright chat, uploads, search, WhatsApp, and health features.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/backend-unavailable"
  status = 200
  force = true

# SPA fallback - all routes serve index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and performance headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(self), interest-cohort=()"
    X-XSS-Protection = "1; mode=block"

# Long cache for hashed build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for the HTML shell so deployments propagate fast.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
