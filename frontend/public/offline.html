<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Kyrovia — Offline</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(145deg, #0a0a0f 0%, #111827 40%, #1a1a2e 100%);
        color: #e5e7eb;
        overflow: hidden;
      }

      .offline-container {
        text-align: center;
        padding: 2.5rem;
        max-width: 480px;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .offline-icon {
        width: 96px;
        height: 96px;
        margin: 0 auto 2rem;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.15));
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(99, 102, 241, 0.25);
        box-shadow: 0 0 60px rgba(99, 102, 241, 0.12);
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.12); }
        50% { box-shadow: 0 0 80px rgba(99, 102, 241, 0.25); }
      }

      .offline-icon svg {
        width: 48px;
        height: 48px;
        stroke: #818cf8;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        margin-bottom: 0.75rem;
        background: linear-gradient(135deg, #e5e7eb, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #9ca3af;
        margin-bottom: 2rem;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 2rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
      }

      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
      }

      .retry-btn:active {
        transform: translateY(0);
      }

      .bg-glow {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.08;
        pointer-events: none;
        z-index: -1;
      }

      .bg-glow--1 {
        top: -100px;
        right: -100px;
        background: #6366f1;
      }

      .bg-glow--2 {
        bottom: -100px;
        left: -100px;
        background: #8b5cf6;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <div class="offline-container">
      <div class="offline-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p>Kyrovia needs an internet connection to reach the AI backend. Check your connection and try again.</p>
      <button class="retry-btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
        </svg>
        Retry
      </button>
    </div>
  </body>
</html>
